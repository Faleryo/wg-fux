server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (re-declared per location because nginx add_header does
    # NOT inherit into a child block that defines its own add_header directives).
    # ── Content-hashed build assets (filename changes on every rebuild) ─────────
    # Safe to cache aggressively: a new deploy ships new filenames.
    location /assets/ {
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ── index.html must always be revalidated ──────────────────────────────────
    # Without this, browsers apply heuristic caching and keep serving a stale
    # bundle after a deploy, so shipped fixes never reach users.
    location = /index.html {
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────────
    location / {
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
