server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Content-Security-Policy (défini une fois, réutilisé dans chaque location car
    # add_header n'hérite pas dans un bloc enfant qui déclare ses propres headers).
    #
    #   script-src : 'self' + le HASH sha256 de l'UNIQUE <script> inline de
    #     index.html (injection des window.* — voir index.html). Pas de
    #     'unsafe-inline' : une XSS ne peut donc pas exécuter de script injecté.
    #     ⚠️ Si ce <script> inline change, régénérer le hash :
    #        node -e "const c=require('crypto'),f=require('fs');\
    #          const m=f.readFileSync('dist/index.html','utf8')\
    #          .match(/<script>([\s\S]*?)<\/script>/);\
    #          console.log('sha256-'+c.createHash('sha256').update(m[1]).digest('base64'))"
    #     Un hash périmé bloque juste le script inline (les window.* retombent sur
    #     leurs valeurs par défaut, cf. `|| 'wg0'` / `|| 'WG-FUX'`) — l'app charge.
    #   style-src  : 'unsafe-inline' requis (styles inline React/Recharts) + Google Fonts CSS.
    #   img-src    : data: pour le SVG de bruit inline (LoginPage) et exports.
    #   connect-src: 'self' (API + WebSocket same-origin) + https: pour Sentry si
    #     VITE_SENTRY_DSN est configuré (host inconnu au build). Resserrer sur le
    #     host Sentry précis si vous en utilisez un.
    set $wg_csp "default-src 'self'; script-src 'self' 'sha256-QMdVXeBcCWl7h4MmCyBWXPAR2Ti+Cycc6Ss8bvpSIYg='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'";

    # Security headers (re-declared per location because nginx add_header does
    # NOT inherit into a child block that defines its own add_header directives).
    # ── Content-hashed build assets (filename changes on every rebuild) ─────────
    # Safe to cache aggressively: a new deploy ships new filenames.
    location /assets/ {
        add_header Content-Security-Policy $wg_csp always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ── index.html must always be revalidated ──────────────────────────────────
    # Without this, browsers apply heuristic caching and keep serving a stale
    # bundle after a deploy, so shipped fixes never reach users.
    location = /index.html {
        add_header Content-Security-Policy $wg_csp always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    # ── SPA fallback ───────────────────────────────────────────────────────────
    location / {
        add_header Content-Security-Policy $wg_csp always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cache-Control "no-cache" always;
        try_files $uri $uri/ /index.html;
    }
}
