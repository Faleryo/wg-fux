name: CI

# Déclenché sur push et pull_request ciblant main.
# Trois jobs indépendants tournent en parallèle : tests API, build UI, lint.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Annule les runs obsolètes sur une même ref (ex : push rapides successifs).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Tests de l'API (Node/Express + vitest)
  # ---------------------------------------------------------------------------
  api-tests:
    name: API tests (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-service
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # Chaque sous-projet a son propre lockfile : on cible le bon
          # pour que la clé de cache npm soit correcte.
          cache-dependency-path: api-service/package-lock.json

      # npm ci = install reproductible depuis package-lock.json.
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run
        env:
          NODE_ENV: test
          VITEST: 'true'

  # ---------------------------------------------------------------------------
  # Job 2 — Build de l'interface (React/Vite)
  # ---------------------------------------------------------------------------
  ui-build:
    name: UI build (vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard-ui
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx vite build

  # ---------------------------------------------------------------------------
  # Job 3 — Lint (eslint) sur les deux sous-projets
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (eslint)
    runs-on: ubuntu-latest
    # continue-on-error : le lint ne doit PAS bloquer le merge tant que la
    # base de code n'a pas été mise en conformité. Aucune CI n'existait avant,
    # donc des violations préexistantes sont probables ; le job reste visible
    # et informatif. À retirer une fois la dette lint résorbée.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          # Deux lockfiles à surveiller pour le cache (un par sous-projet).
          cache-dependency-path: |
            api-service/package-lock.json
            dashboard-ui/package-lock.json

      # On installe les deux sous-projets pour disposer de leurs plugins eslint.
      - name: Install api-service dependencies
        working-directory: api-service
        run: npm ci

      - name: Install dashboard-ui dependencies
        working-directory: dashboard-ui
        run: npm ci

      - name: Lint api-service
        working-directory: api-service
        run: npx eslint .

      - name: Lint dashboard-ui
        working-directory: dashboard-ui
        run: npx eslint .
