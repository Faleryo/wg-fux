name: WG-FUX CI (Platinum Shield)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  quality:
    name: Code Quality & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api-service/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Lint Check
        run: npm run lint

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: Execute Tests & Verify Coverage
        run: npm test -- --coverage
        env:
          NODE_ENV: test
          VITEST: true
          # 🛡️ OBSIDIAN-HARDENING: Coverage threshold is enforced here
          # (Vitest uses the threshold defined in vite.config.ts or package.json)

  security:
    name: Secret & SAST Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan Secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  build:
    name: Build Verification
    needs: [quality, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build API Service
        working-directory: api-service
        run: |
          npm ci
          # If there was a build step, it would go here.
          # For Node.js APIs, we check if it starts.
          node --check ../server.js
