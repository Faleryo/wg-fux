name: WG-FUX CI ()

on:
 push:
 branches: [ main, develop ]
 pull_request:
 branches: [ main, develop ]

permissions:
 contents: read

jobs:
 quality:
 name: Code Quality & Coverage
 runs-on: ubuntu-latest
 defaults:
 run:
 working-directory: api-service

 steps:
 - uses: actions/checkout@v4

 - name: Setup Node.js
 uses: actions/setup-node@v4
 with:
 node-version: '20'
 cache: 'npm'
 cache-dependency-path: api-service/package-lock.json

 - name: Install Dependencies
 run: npm ci

 - name: Lint Check
 run: npm run lint

 - name: Security Audit
 run: npm audit --audit-level=high

 - name: Execute Tests & Verify Coverage
 run: npm test -- --coverage
 env:
 NODE_ENV: test
 VITEST: true
 # 🛡️ OBSIDIAN-HARDENING: Coverage threshold is enforced here
 # (Vitest uses the threshold defined in vite.config.ts or package.json)

 security:
 name: Secret & SAST Scan
 runs-on: ubuntu-latest
 steps:
 - uses: actions/checkout@v4
 with:
 fetch-depth: 0

 - name: Scan Secrets (TruffleHog)
 # Pin to a release tag rather than @main to prevent tag/branch hijacking.
 uses: trufflesecurity/trufflehog@v3.81.10
 with:
 path: ./
 base: ${{ github.event.repository.default_branch }}
 head: HEAD
 extra_args: --only-verified

 build:
 name: Build Verification
 needs: [quality, security]
 runs-on: ubuntu-latest
 steps:
 - uses: actions/checkout@v4

 - name: Build API Service
 working-directory: api-service
 run: |
 npm ci
 node --check ../server.js

 e2e-tests:
 name: Playwright E2E Tests
 needs: [quality]
 runs-on: ubuntu-latest
 steps:
 - uses: actions/checkout@v4
 - uses: actions/setup-node@v4
 with:
 node-version: '20'
 cache: 'npm'
 cache-dependency-path: dashboard-ui/package-lock.json

 - name: Install Dependencies
 working-directory: dashboard-ui
 run: npm ci

 - name: Install Playwright Browsers
 working-directory: dashboard-ui
 run: npx playwright install --with-deps chromium

 - name: Run Playwright tests
 working-directory: dashboard-ui
 run: npx playwright test

 - uses: actions/upload-artifact@v4
 if: always()
 with:
 name: playwright-report
 path: dashboard-ui/playwright-report/
 retention-days: 30

 deploy:
 name: Deploy to Production
 needs: [e2e-tests, build]
 if: github.ref == 'refs/heads/main' && github.event_name == 'push'
 runs-on: ubuntu-latest
 steps:
 - uses: actions/checkout@v4

 - name: Deploy via SSH
 # Pin to a tag rather than @master. Consider further pinning to a full SHA.
 uses: appleboy/ssh-action@v1.0.3
 with:
 host: ${{ secrets.PROD_HOST }}
 username: ${{ secrets.PROD_USER }}
 key: ${{ secrets.PROD_SSH_KEY }}
 script: |
 cd /opt/wg-fux
 git pull origin main
 docker compose build
 docker compose up -d
 ./scripts/verify-task.sh
