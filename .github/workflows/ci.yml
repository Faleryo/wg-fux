name: WG-FUX CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  api-service-quality:
    name: Backend Quality (API)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-service
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api-service/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build --if-present

  dashboard-ui-quality:
    name: Frontend Quality (UI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard-ui
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dashboard-ui/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build

  security-scan:
    name: Security Hardening (P9/D)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
