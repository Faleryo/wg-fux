# Rate limiting zone mapping
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# Map pour la gestion des connexions WebSocket
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Challenge ACME Let's Encrypt (HTTP, non chiffré — requis pour certbot)
server {
    listen 80;
    listen [::]:80;
    server_name ${DOMAIN};

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    # Route dédiée pour les challenges Let's Encrypt (CRITICAL-2)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirection HTTP → HTTPS pour tout le reste
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS - Premium Sentinel Proxy
server {
    listen 443 ssl default_server;
    server_name _;

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    # SSL Configuration
    # Défaut: certificat auto-signé (toujours présent, nginx peut démarrer du 1er coup)
    # setup-ssl.sh remplace ces lignes par les chemins Let's Encrypt après validation Certbot
    ssl_certificate /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline' 'unsafe-eval'; frame-ancestors 'self';" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # API Service — BUG-FIX: /api/ avec trailing slash pour un matching précis
    location /api/ {
        # SRE Robustness: retry logic for 502 immunity
        proxy_next_upstream error timeout invalid_header http_502 http_503 http_504;
        proxy_pass http://wg-fux-api:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }


    # AdGuard Home DNS UI — Restricted to WireGuard IP (v6.5 SRE Enforced)
    location /dns/ {
        # SRE Security: Only allow internal VPN subnet
        allow 10.0.0.0/24;
        allow 172.20.0.0/16; # Docker internal
        deny all;

        set $upstream_adguard adguard;
        proxy_pass http://$upstream_adguard:3000/;
        
        # 💠 SRE FIX: AdGuard 400 Immunity
        proxy_set_header Host $host;
        proxy_set_header Origin ""; # Detach origin for CSRF bypass in AdGuard
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /dns;
        
        # FIX: Path rewrites for AdGuard internally
        proxy_redirect / /dns/;
        proxy_cookie_path / /dns/;

        # WebSocket support (re-inherited if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Dashboard UI — SPA fallback
    location / {
        proxy_pass http://ui:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
