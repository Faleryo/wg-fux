services:
  nginx:
    image: nginx:alpine
    container_name: wg-sentinel-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - ui
    networks:
      - vpn-internal

  api:
    build:
      context: .
      dockerfile: api-service/Dockerfile
    container_name: wg-fux-api
    restart: always
    privileged: true
    env_file:
      - ./api-service/.env
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.all.forwarding=1
    volumes:
      - ./api-service/data:/app/data
      - /etc/wireguard:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"
    # Port 3000 is now internal to vpn-internal network
    networks:
      - vpn-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ui:
    build:
      context: .
      dockerfile: dashboard-ui/Dockerfile
    container_name: wg-fux-dashboard
    restart: always
    # Port 80 is now internal to vpn-internal network
    depends_on:
      - api
    networks:
      - vpn-internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  vpn-internal:
    driver: bridge
    internal: false
